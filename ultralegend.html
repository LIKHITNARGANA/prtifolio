    <style>
        /* Basic reset for margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body style with background image */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0iQUwpEZ5z03eay76qGFVs5FJcnTXBXa7Ug&s'); /* Add your image URL here */
            background-size: cover;  /* Cover the entire page */
            background-position: center;  /* Center the image */
            background-repeat: no-repeat;  /* Do not repeat the image */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: #fff;  /* Set text color to white for better contrast */
            position: relative; /* Needed to position the heading at the top */
            animation: fadeIn 2s ease-out;
        }

        /* Animation for fade-in */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Heading styles */
        h1 {
            color: #000;  /* Change heading color to black */
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px; /* Space between the heading and the links */
            z-index: 1;  /* Ensure the title appears above the background */
            animation: bounceIn 2s ease-out;
            transition: transform 0.3s ease, color 0.3s ease; /* Adding transition for smooth hover */
        }

        /* Bounce animation for heading */
        @keyframes bounceIn {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }

        /* Hover animation for the heading */
        h1:hover {
            color: #ff6347;  /* Change the color to a different shade on hover (Tomato color) */
            transform: scale(1.1);  /* Slightly increase the size */
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);  /* Add a subtle shadow on hover */
        }

        /* Link styles (Button) */
        a {
            text-decoration: none;
            font-size: 24px;
            color: #000; /* Set link color to black */
            margin: 10px 0;
            display: block;  /* Make links stack vertically */
            z-index: 1;  /* Ensure the link appears above the background */
            position: relative; /* Positioning the links */
            opacity: 1;  /* Remove the fading effect */
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Button hover animation */
        a:hover {
            color: #fff;
            text-decoration: underline;
            transform: scale(1.1); /* Button grows slightly on hover */
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3); /* Shadow effect on hover */
        }

        /* Button colors */
        .btn-primary { background-color: #007bff; border-color: #007bff; }
        .btn-warning { background-color: #ffc107; border-color: #ffc107; }
        .btn-success { background-color: #28a745; border-color: #28a745; }
        .btn-info { background-color: #17a2b8; border-color: #17a2b8; }
        .btn-danger { background-color: #dc3545; border-color: #dc3545; }
        .btn-dark { background-color: #343a40; border-color: #343a40; }
        .btn-secondary { background-color: #6c757d; border-color: #6c757d; }
        .btn-light { background-color: #f8f9fa; border-color: #f8f9fa; }

        /* Bootstrap container for centering */
        .container {
            text-align: center;
        }

        /* Styles for button images */
        .btn img {
            width: 30px; /* Adjust image size */
            margin-right: 10px; /* Space between image and text */
        }
    </style>
</head>
