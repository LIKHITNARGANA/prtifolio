    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden; 
        }
        .video-background {
            position: fixed; 
            top: 0; 
            left: 0; 
            min-width: 100%; 
            min-height: 100%; 
            width: auto; 
            height: auto; 
            z-index: -1;
            object-fit: cover; 
        }
        .overlay {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }
        .games-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 items per row */
            gap: 20px;
            padding: 50px;
            z-index: 2;
            position: relative;
            min-height: 100vh; 
            overflow: hidden; /* Changed to hide overflow */
        }
        .game-container {
            text-align: center;
            z-index: 2;
            position: relative;
            margin-bottom: 20px;
        }
        .game-image {
            height: 200px; /* Adjusted size */
            width: 200px; /* Adjusted size */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .game-image:hover {
            transform: scale(1.2); /* Slightly smaller scale for hover */
            box-shadow: 0px 4px 15px rgba(225, 18, 18, 0.2);
        }
        .game-title {
            margin-top: 10px;
            font-size: 1.2em; /* Adjusted font size */
            color: #fff;
        }
        a {
            text-decoration: none;
            color: #fff;
        }
    </style>
</head>
